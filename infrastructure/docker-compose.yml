version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lexstudy_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lexstudy
      POSTGRES_PASSWORD: lexstudy_password
      POSTGRES_DB: lexstudy_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexstudy -d lexstudy_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lexstudy_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass lexstudy_redis_pass
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "lexstudy_redis_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.25-alpine
    container_name: lexstudy_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    profiles:
      - production

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: lexstudy_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://lexstudy:lexstudy_password@postgres:5432/lexstudy_db
      REDIS_URL: redis://:lexstudy_redis_pass@redis:6379
    env_file:
      - ../../.env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
